<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prof. Dr. Awais Yasin | MagicQC</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #1C4A5A 0%, #2E6B7E 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 24px 16px;
  }

  .card {
    background: #ffffff;
    width: 100%;
    max-width: 400px;
    border-radius: 24px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.35), 0 8px 24px rgba(0,0,0,0.2);
    overflow: hidden;
    animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Header ── */
  .card-header {
    background: linear-gradient(160deg, #1C4A5A 0%, #2E6B7E 100%);
    position: relative;
    padding: 28px 24px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 90px;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 20px;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    flex-shrink: 0;
  }

  .logo-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    mix-blend-mode: multiply;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.5px;
  }

  .logo-text span {
    color: #fff;
  }

  /* curved white cutout */
  .header-curve {
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 100%;
    height: 48px;
    overflow: hidden;
  }

  .header-curve svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── Profile Section ── */
  .profile-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 24px 20px;
    margin-top: 0;
  }

  .avatar-ring {
    width: 108px;
    height: 108px;
    border-radius: 50%;
    background: conic-gradient(#8B7D2A 0deg, #C4A832 80deg, #2E6B7E 180deg, #1C4A5A 280deg, #8B7D2A 360deg);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 3px #fff, 0 4px 18px rgba(180,155,50,0.4);
    margin-bottom: 14px;
    flex-shrink: 0;
  }

  .avatar-ring img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  .badge {
    background: linear-gradient(135deg, #F5A623, #D4891A);
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 50px;
    margin-bottom: 12px;
  }

  .name {
    font-size: 22px;
    font-weight: 800;
    color: #1a2a32;
    text-align: center;
    margin-bottom: 4px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 13px;
    font-weight: 500;
    color: #2E6B7E;
    text-align: center;
    margin-bottom: 0;
  }

  .divider {
    height: 1px;
    background: #e8eef0;
    margin: 18px 24px;
  }

  /* ── Buttons ── */
  .buttons {
    padding: 0 20px 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 14px 20px;
    border-radius: 50px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    cursor: pointer;
  }

  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(0,0,0,0.22);
  }

  .btn:active {
    transform: translateY(-1px);
  }

  .btn-whatsapp {
    background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
    box-shadow: 0 4px 16px rgba(37,211,102,0.35);
  }

  .btn-linkedin {
    background: linear-gradient(135deg, #0077B5 0%, #004C87 100%);
    box-shadow: 0 4px 16px rgba(0,119,181,0.35);
  }

  .btn-website {
    background: linear-gradient(135deg, #F5A623 0%, #D4891A 100%);
    box-shadow: 0 4px 16px rgba(245,166,35,0.4);
  }

  .btn-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }

</style>
</head>
