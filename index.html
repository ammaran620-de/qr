<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prof. Dr. Awais Yasin | MagicQC</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(145deg, #1C4A5A 0%, #2E6B7E 55%, #1a3a47 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 24px 16px;
  }

  .card {
    background: #ffffff;
    width: 100%;
    max-width: 400px;
    border-radius: 24px;
    box-shadow: 0 28px 72px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.25);
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    background: linear-gradient(160deg, #1C4A5A 0%, #2E6B7E 100%);
    position: relative;
    padding: 22px 28px 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logos-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    width: 100%;
  }

  .logo-img {
    height: 36px;
    max-width: 96px;
    object-fit: contain;
    display: block;
  }

  .logo-divider {
    width: 1px;
    height: 28px;
    background: rgba(255,255,255,0.25);
    flex-shrink: 0;
  }

  .header-curve {
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 100%;
    height: 52px;
    overflow: hidden;
    pointer-events: none;
  }

  .header-curve svg { width: 100%; height: 100%; display: block; }

  .profile-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 24px 18px;
  }

  .avatar-ring {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, #F5A623 0%, #2E6B7E 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 3px #fff, 0 6px 22px rgba(245,166,35,0.55);
    margin-bottom: 14px;
    flex-shrink: 0;
  }

  .avatar-ring img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  .name {
    font-size: 21px;
    font-weight: 800;
    color: #1A2B35;
    text-align: center;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .badge {
    background: #F5A623;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 8px;
    text-align: center;
  }

  .subtitle {
    font-size: 12.5px;
    font-weight: 600;
    color: #2E6B7E;
    text-align: center;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #d0e4ea, transparent);
    margin: 16px 24px;
  }

  .buttons {
    padding: 0 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 14px 20px;
    border-radius: 13px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    cursor: pointer;
  }

  .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,0,0,0.22); }
  .btn:active { transform: translateY(0); }

  .btn-whatsapp {
    background: linear-gradient(135deg, #25D366 0%, #1ebe5a 100%);
    box-shadow: 0 4px 14px rgba(37,211,102,0.35);
  }

  .btn-linkedin {
    background: linear-gradient(135deg, #0A66C2 0%, #0855a3 100%);
    box-shadow: 0 4px 14px rgba(10,102,194,0.35);
  }

  .btn-website {
    background: linear-gradient(135deg, #F5A623 0%, #D4891A 100%);
    box-shadow: 0 4px 14px rgba(245,166,35,0.4);
  }

  .btn-icon { width: 22px; height: 22px; flex-shrink: 0; }

  .qr-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4px 24px 16px;
  }

  .qr-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: #6B8C9A;
    margin-bottom: 12px;
  }

  .qr-frame {
    background: #fff;
    border-radius: 12px;
    padding: 10px;
    border: 1.5px solid #d8eaee;
    box-shadow: 0 2px 10px rgba(44,90,106,0.1);
  }

  #qrcode canvas, #qrcode img { display: block; }

  .qr-url {
    font-size: 11px;
    color: #6B8C9A;
    margin-top: 8px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .card-footer {
    background: #f2f7f9;
    text-align: center;
    padding: 11px 20px;
    font-size: 11px;
    color: #6B8C9A;
    font-weight: 500;
    margin-top: 4px;
  }

  .card-footer a {
    color: #2E6B7E;
    text-decoration: none;
    font-weight: 700;
  }
</style>
</head>
