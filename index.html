<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prof. Dr. Awais Yasin | MagicQC</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  background:linear-gradient(145deg,#0e2530,#1C4A5A,#0e2530);
  display:flex;align-items:center;justify-content:center;
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  padding:24px 16px;
}
.card{
  background:#fff;width:100%;max-width:400px;
  border-radius:24px;
  box-shadow:0 32px 80px rgba(0,0,0,0.45);
  overflow:hidden;
  animation:fadeUp 0.5s cubic-bezier(.23,1,.32,1) both;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}
.logo-header{
  background:#fff;
  padding:18px 8px 16px;
  display:flex;align-items:center;justify-content:center;
}
.logo-slot{flex:1;display:flex;align-items:center;justify-content:center;padding:0 6px;}
.logo-slot img{height:54px;width:auto;max-width:110px;object-fit:contain;display:block;}
.logo-slot:first-child img{height:64px;max-width:150px;}
.logo-slot:nth-child(3) img{height:60px;max-width:80px;}
.logo-slot:nth-child(5) img{height:32px;max-width:105px;}
.logo-sep{width:1px;height:36px;flex-shrink:0;background:linear-gradient(180deg,transparent,#CBD9DE 30%,#CBD9DE 70%,transparent);}
.arc-wrap{background:#fff;line-height:0;}
.arc-wrap svg{width:100%;display:block;}
.profile-section{
  display:flex;flex-direction:column;align-items:center;
  padding:0 24px 18px;background:#fff;
}
.avatar-ring{
  width:96px;height:96px;border-radius:50%;
  background:linear-gradient(135deg,#F5A623,#2E6B7E);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 3px #fff,0 6px 24px rgba(245,166,35,0.4);
  margin-top:-22px;flex-shrink:0;
}
.avatar-ring img{
  width:86px;height:86px;border-radius:50%;
  object-fit:cover;object-position:center top;display:block;
}
.name{font-size:21px;font-weight:700;color:#1A2B35;text-align:center;margin-top:12px;margin-bottom:8px;line-height:1.2;}
.badge{
  background:linear-gradient(90deg,#1C4A5A,#2E6B7E);
  color:#e8f4f8;font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  padding:5px 14px;border-radius:20px;margin-bottom:7px;text-align:center;
  border:1px solid rgba(255,255,255,0.15);
}
.role{font-size:12.5px;font-weight:600;color:#2E6B7E;text-align:center;}
.thin-divider{height:1px;background:linear-gradient(90deg,transparent,#dde8ec,transparent);margin:16px 24px;}
.buttons{padding:0 20px 22px;display:flex;flex-direction:column;gap:11px;}
.btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:14px 20px;border-radius:13px;
  text-decoration:none;font-size:15px;font-weight:600;color:#fff;
  transition:transform 0.18s ease,filter 0.18s ease;
}
.btn:hover{transform:translateY(-2px);filter:brightness(1.07);}
.btn:active{transform:translateY(0);}
.btn svg{width:21px;height:21px;flex-shrink:0;}
.btn-wa{background:linear-gradient(135deg,#25D366,#1da851);}
.btn-li{background:linear-gradient(135deg,#0A66C2,#0855a3);}
.btn-wb{background:linear-gradient(135deg,#F5A623,#D4891A);}
.card-footer{
  background:#f5f9fa;border-top:1px solid #e5eef1;
  padding:13px 24px;font-size:11px;color:#8aabb5;text-align:center;
}
.card-footer a{color:#2E6B7E;font-weight:700;text-decoration:none;}
</style>
</head>
